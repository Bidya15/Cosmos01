spring.application.name=cosmos-backend

# Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/cosmos
spring.datasource.username=postgres
spring.datasource.password=password
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Increase upload limits for Base64 images
server.tomcat.max-http-post-size=10MB
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# --- WebSocket ---
cosmos.websocket.allowed-origins=http://localhost:3000,http://localhost:3001,http://localhost:5173,http://127.0.0.1:3000,http://127.0.0.1:3001

# --- Cosmos Game Config ---
cosmos.proximity.radius=150.0
cosmos.world.width=2400
cosmos.world.height=1800
cosmos.position.throttle-ms=50
