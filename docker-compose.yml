version: '3.9'

services:

  # ── PostgreSQL ──────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: cosmos_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: cosmos_db
      POSTGRES_USER: cosmos_user
      POSTGRES_PASSWORD: cosmos_secret
    ports:
      - "5432:5432"
    volumes:
      - cosmos_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cosmos_user -d cosmos_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Spring Boot Backend ─────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cosmos_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/cosmos_db
      SPRING_DATASOURCE_USERNAME: cosmos_user
      SPRING_DATASOURCE_PASSWORD: cosmos_secret
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT: org.hibernate.dialect.PostgreSQLDialect
      COSMOS_WEBSOCKET_ALLOWED_ORIGINS: http://localhost:3000,http://frontend:3000
      COSMOS_PROXIMITY_RADIUS: 150
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/cosmos/health"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── React Frontend ──────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cosmos_frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      VITE_API_URL: http://localhost:8080

volumes:
  cosmos_pgdata:
